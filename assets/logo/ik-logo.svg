<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">

  <!-- iK mark — House of Lamport / Ian Kenyon -->
  <!-- Colours: charcoal #1E2B33, gold #C8922A, arc #9CA3AF -->

  <g transform="translate(80, 120)">

    <!-- Stem: slightly shorter at bottom than top -->
    <rect fill="#1E2B33" x="-30" y="-90" width="18" height="165" rx="4"/>

    <!-- Chevron: two arms meeting at vertex (2,0), 45° each -->
    <rect fill="#1E2B33" x="2" y="-8" width="71" height="16" rx="3" transform="rotate(-45, 2, 0)"/>
    <rect fill="#1E2B33" x="2" y="-8" width="71" height="16" rx="3" transform="rotate(45, 2, 0)"/>

    <!-- Gold dot — i dot, centred on stem -->
    <circle cx="-21" cy="-108" r="13" fill="#C8922A"/>

    <!-- Dashed semicircle arc above, centred on dot -->
    <path
      d="M -76 -108 A 55 55 0 0 1 34 -108"
      fill="none"
      stroke="#9CA3AF"
      stroke-width="2"
      stroke-dasharray="5 4"
      stroke-linecap="round"
    />

  </g>

</svg>
